de plus en plus petites."},{"q":"Qu'est-ce qu'une suite ?","opts":["Une équation à deux inconnues","Une liste ordonnée et infinie de nombres","Un intervalle de la droite réelle","Une courbe continue traçable sans lever le crayon"],"a":1,"exp":"Une suite est une liste ordonnée et infinie : u₀, u₁, u₂… Son graphe est une poussière de points isolés, pas une courbe."},{"q":"Le graphe d'une suite est…","opts":["toujours une asymptote","une poussière de points isolés","une courbe continue","une droite"],"a":1,"exp":"L'indice n avance par sauts (1, 2, 3…) et ne prend jamais de valeur intermédiaire : on ne relie donc pas les points."},{"q":"Quelle est la différence entre définition explicite et définition par récurrence ?","opts":["L'explicite ne marche que pour Fibonacci","La récurrence calcule directement u₁₀₀","Il n'y a aucune différence","L'explicite donne uₙ à partir de n ; la récurrence donne le passage d'un terme au suivant"],"a":3,"exp":"Explicite : uₙ = 2n+1 donne directement u₁₀₀. Récurrence : on donne u₀ et la règle de passage, qu'on déroule de proche en proche."},{"q":"La suite de Fibonacci (1, 1, 2, 3, 5, 8…) est définie par…","opts":["la somme des deux termes précédents (récurrence)","une formule explicite simple","la différence des deux termes précédents","une suite géométrique de raison 2"],"a":0,"exp":"Chaque terme est la somme des deux précédents : c'est une définition par récurrence pure, posée dès 1202."},{"q":"Une suite <em>converge</em> lorsque…","opts":["elle oscille régulièrement","ses termes filent vers l'infini","ses termes se rapprochent autant qu'on veut d'une valeur fixe (la limite)","elle est croissante"],"a":2,"exp":"Converger = se rapprocher d'aussi près qu'on veut d'une limite, même sans l'atteindre (ex. : 1/n → 0)."},{"q":"La suite uₙ = 3 + (−1)ⁿ⁄n oscille autour de 3. Converge-t-elle ?","opts":["Non, car elle oscille","Oui, car l'amplitude 1/n des oscillations tend vers 0","Non, car elle dépasse 3","Oui, mais seulement vers +∞"],"a":1,"exp":"Ce qui compte n'est pas le calme du mouvement mais que l'amplitude tende vers 0 : le couloir 3 ± 1/n se referme sur 3."}];var TITLE="L’infini apprivoisé · Jours 1–3";var SUB="∞, intervalles, suites, limite";(function(){
var EMAIL='renaudfabbri@gmail.com';var KEYNAME="s1a";var VID="partie-1.html";
var Q=window.__Q;var N=Q.length;
var state={i:0,answers:new Array(N).fill(-1),locked:new Array(N).fill(false),name:''};
var app=document.getElementById('app');var bar=document.getElementById('bar');

function intro(){setBar(0);app.innerHTML='<div class="intro"><div class="inf">\u221e</div><h1>'+TITLE+'</h1><div class="sub">'+SUB+'</div><p>Dix questions pour v\u00e9rifier ta compr\u00e9hension. Choisis une r\u00e9ponse, re\u00e7ois une explication imm\u00e9diate, puis passe \u00e0 la suivante.</p><div class="namebox"><label>Ton nom (pour la remont\u00e9e au professeur)</label><input id="nm" type="text" placeholder="Pr\u00e9nom Nom" autocomplete="name"></div><div class="start"><button class="btn" id="go">Commencer le quiz \u203a</button></div></div>';document.getElementById('go').onclick=function(){state.name=(document.getElementById('nm').value||'').trim();state.i=0;question();};var nm=document.getElementById('nm');nm.addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('go').click();});}
function question(){var i=state.i;var q=Q[i];setBar(Math.round(i/N*100));var locked=state.locked[i];var chosen=state.answers[i];var opts='';for(var k=0;k<4;k++){var cls='opt';if(locked){if(k===q.a)cls+=' correct';else if(k===chosen)cls+=' wrong';else cls+=' dim';}var L=String.fromCharCode(65+k);opts+='<button class="'+cls+'" data-k="'+k+'" '+(locked?'disabled':'')+'><span class="ltr">'+L+'</span><span>'+q.opts[k]+'</span></button>';}var verdict='';if(locked){var ok=chosen===q.a;verdict='<span class="verdict '+(ok?'ok':'ko')+'">'+(ok?'\u2713 Correct':'\u2717 Incorrect')+'</span>';}var nextLabel=(i===N-1)?'Voir le r\u00e9sultat \u203a':'Question suivante \u203a';app.innerHTML='<div class="card"><div class="qnum">Question '+(i+1)+' sur '+N+'</div><div class="qtext">'+q.q+'</div><div class="opts">'+opts+'</div><div class="exp'+(locked?' show':'')+'" id="exp">'+verdict+q.exp+'</div><div class="nav"><button class="btn" id="next" '+(locked?'':'disabled')+'>'+nextLabel+'</button></div></div>';var btns=app.querySelectorAll('.opt');for(var b=0;b<btns.length;b++){btns[b].onclick=function(){choose(parseInt(this.getAttribute('data-k'),10));};}document.getElementById('next').onclick=function(){if(!state.locked[state.i])return;if(state.i===N-1){results();}else{state.i++;question();window.scrollTo(0,0);}};}
function choose(k){var i=state.i;if(state.locked[i])return;state.answers[i]=k;state.locked[i]=true;question();}
function score(){var s=0;for(var i=0;i<N;i++)if(state.answers[i]===Q[i].a)s++;return s;}
function msgFor(s){if(s>=9)return 'Ma\u00eetrise remarquable. Tu peux avancer en confiance.';if(s>=7)return 'Tr\u00e8s bon r\u00e9sultat. Quelques points \u00e0 revoir, mais l\u2019essentiel est l\u00e0.';if(s>=5)return 'R\u00e9sultat correct. Revois les sc\u00e8nes li\u00e9es aux questions manqu\u00e9es.';return 'Reprends la vid\u00e9o de cette s\u00e9quence, puis retente le quiz \u2014 tu vas progresser vite.';}
function results(){var s=score();setBar(100);var rows='';for(var i=0;i<N;i++){var ok=state.answers[i]===Q[i].a;rows+='<div class="rrow"><span class="mk '+(ok?'y':'n')+'">'+(ok?'\u2713':'\u2717')+'</span><span>Q'+(i+1)+'. '+esc(stripTags(Q[i].q))+'</span></div>';}app.innerHTML='<div class="res"><div class="scorebig">'+s+'<span class="scoremax">/'+N+'</span></div><h2>'+(state.name?esc(state.name)+', ':'')+'voici ton score</h2><div class="msg">'+msgFor(s)+'</div><div class="reslist">'+rows+'</div><div class="resbtns"><button class="btn" id="send">\u2709 Envoyer mes r\u00e9sultats</button><button class="btn ghost" id="retry">\u21ba Recommencer</button><a class="btn ghost" href="'+VID+'" style="text-decoration:none;display:inline-flex;align-items:center">\u25b6 Revoir la vid\u00e9o</a><a class="btn ghost" href="index.html" style="text-decoration:none;display:inline-flex;align-items:center">\u2302 Menu</a></div><div class="sent" id="sent">Le bouton ouvre ton logiciel de messagerie, avec un e-mail pr\u00e9-rempli pour '+EMAIL+'.</div></div>';document.getElementById('send').onclick=function(){sendMail(s);};document.getElementById('retry').onclick=function(){state.answers=new Array(N).fill(-1);state.locked=new Array(N).fill(false);state.i=0;question();window.scrollTo(0,0);};window.scrollTo(0,0);}
function sendMail(s){var who=state.name||'(nom non renseign\u00e9)';var d=new Date();var date=d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR');var lines=[];lines.push('Quiz : L\u2019infini en math\u00e9matiques \u2014 '+TITLE);lines.push('\u00c9l\u00e8ve : '+who);lines.push('Date : '+date);lines.push('Score : '+s+' / '+N+' ('+Math.round(s/N*100)+'%)');lines.push('');lines.push('D\u00e9tail des r\u00e9ponses :');for(var i=0;i<N;i++){var ok=state.answers[i]===Q[i].a;var ch=state.answers[i]>=0?String.fromCharCode(65+state.answers[i]):'\u2014';var gd=String.fromCharCode(65+Q[i].a);lines.push((i+1)+'. '+(ok?'OK':'X')+'  r\u00e9ponse: '+ch+(ok?'':' / correct: '+gd)+'  \u2014 '+stripTags(Q[i].q));}var subject='Quiz L\u2019infini \u2014 '+TITLE+' \u2014 '+who+' \u2014 '+s+'/'+N;var href='mailto:'+EMAIL+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(lines.join('\n'));window.location.href=href;document.getElementById('sent').textContent='Si rien ne s\u2019ouvre, copie ton score ('+s+'/'+N+') et envoie-le \u00e0 '+EMAIL+'.';}
